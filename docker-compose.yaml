services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always
  
  docmind:
    build:
      context: ./docmind
    depends_on:
      - qdrant
    ports:
      - "8000:8000"